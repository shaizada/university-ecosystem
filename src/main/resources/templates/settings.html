<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Баптаулар | UniEcosystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Түнгі режим стильдері */
        body.dark-mode {
            background-color: #121212 !important;
            color: #ffffff;
        }
        .dark-mode .card {
            background-color: #1e1e1e;
            color: white;
            border: 1px solid #333;
        }
        .dark-mode .form-control, .dark-mode .form-select {
            background-color: #2d2d2d;
            border-color: #444;
            color: white;
        }
        .dark-mode .form-control:focus {
            background-color: #3d3d3d;
            color: white;
        }
        .theme-switch {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
        }
        .dark-mode .theme-switch {
            background: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body id="mainBody" style="background-color: #f4f7f6; transition: 0.3s;">
    <!-- Навбар -->
    <div th:replace="~{header :: navbar}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0 rounded-4">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-4 border-bottom pb-2">Жүйе баптаулары</h4>
                        
                        <!-- 1. Тілді өзгерту -->
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold text-uppercase">Жүйе тілі (Language)</label>
                            <select class="form-select border-0 shadow-sm p-3 rounded-3">
                                <option value="kz">Қазақша</option>
                                <option value="en">English</option>
                                <option value="ru">Русский</option>
                            </select>
                        </div>

                        <!-- 2. Түнгі режим (Dark Mode) -->
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold text-uppercase">Интерфейс режимі</label>
                            <div class="theme-switch" onclick="toggleDarkMode()">
                                <span id="themeLabel">Күндізгі режим (Light Mode)</span>
                                <div class="form-check form-switch m-0">
                                    <input class="form-check-input" type="checkbox" id="darkModeSwitch" style="cursor: pointer;">
                                </div>
                            </div>
                        </div>

                        <hr>

                        <!-- 3. Жеке мәліметтер -->
                        <form>
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">ТОЛЫҚ ЕСІМ</label>
                                <input type="text" class="form-control p-3 border-0 shadow-sm rounded-3" th:value="${userName}">
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">ҚҰПИЯ СӨЗДІ ЖАҢАРТУ</label>
                                <input type="password" class="form-control p-3 border-0 shadow-sm rounded-3" placeholder="********">
                            </div>
                            
                            <button type="submit" class="btn btn-warning w-100 py-3 fw-bold rounded-3 shadow-sm">ӨЗГЕРІСТЕРДІ САҚТАУ</button>
                        </form>

                        <div class="text-center mt-4">
                            <a href="/logout" class="text-danger fw-bold text-decoration-none small">Тіркелгіден шығу</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Түнгі режимге ауыстыру скрипті -->
    <script>
        function toggleDarkMode() {
            const body = document.body;
            const switchInput = document.getElementById('darkModeSwitch');
            const label = document.getElementById('themeLabel');

            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                switchInput.checked = true;
                label.innerText = "Түнгі режим (Dark Mode)";
                localStorage.setItem('theme', 'dark'); // Режимді сақтап қою
            } else {
                switchInput.checked = false;
                label.innerText = "Күндізгі режим (Light Mode)";
                localStorage.setItem('theme', 'light');
            }
        }

        // Бет жүктелгенде бұрынғы таңдауды тексеру
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkModeSwitch').checked = true;
                document.getElementById('themeLabel').innerText = "Түнгі режим (Dark Mode)";
            }
        };
    </script>
</body>
</html>
