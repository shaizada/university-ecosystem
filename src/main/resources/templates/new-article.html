<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Жаңа мақала жариялау</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .form-card { border-radius: 15px; border: none; }
    </style>
</head>
<body>
    <div th:replace="~{header :: navbar}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card form-card shadow-sm p-4">
                    <h3 class="fw-bold mb-4">📢 Жаңа мақала жариялау</h3>
                    <form th:action="@{/articles/save}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Мақаланың тақырыбы</label>
                            <input type="text" name="title" class="form-control" placeholder="Тақырыпты жазыңыз..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Мақаланың мазмұны</label>
                            <textarea name="content" class="form-control" rows="10" placeholder="Толық мәтінді осында жазыңыз..." required></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning px-5 fw-bold">ЖАРЫЯЛАУ</button>
                            <a href="/home" class="btn btn-light px-4">Болдырмау</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
