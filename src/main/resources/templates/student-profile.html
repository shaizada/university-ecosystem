<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жеке кабинет | Студент</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: 0.3s; }
        
        /* КЕЗ КЕЛГЕН РЕЖИМГЕ ИКЕМДІ БЛОКТАР */
        .profile-header, .stat-card, .card-custom {
            background-color: var(--bs-tertiary-bg) !important; /* Автоматты фон */
            border: 1px solid var(--bs-border-color) !important;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .profile-cover {
            height: 120px;
            background: linear-gradient(135deg, #ffc107 0%, #ff8c00 100%);
        }

        .avatar-wrapper { margin-top: -60px; padding: 0 30px; }

        .avatar-img {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 5px solid #1e1e1e; /* Шетін қоюлаттық */
            background: #222;
            object-fit: cover;
        }
        /* Мынаны қосып жібер (жазулар ап-ақ болып тұруы үшін) */
        .text-main { color: #ffffff !important; font-weight: 600; }
        .text-muted-custom { color: #b0b0b0 !important; }
        
        .stat-card { padding: 20px; text-align: center; }
        .stat-card:hover { transform: translateY(-5px); border-color: #ffc107 !important; }
        
        .section-title {
            font-weight: 700;
            color: #ffc107;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .arrow-btn {
            background: rgba(255, 193, 7, 0.1);
            color: #ffc107 !important;
            border: 1px solid rgba(255, 193, 7, 0.3);
            transition: 0.3s;
        }
        .arrow-btn:hover { background: #ffc107; color: #000 !important; }

        /* Мәтіндердің түсі режимге қарай өзгеруі үшін */
        .adaptive-text { color: var(--bs-body-color) !important; }
    </style>
</head>
<body class="bg-body text-body"> <!-- bg-dark орнына bg-body қолданамыз -->
    
    <div th:replace="~{header :: navbar}"></div>

    <div class="container py-4">
        <div class="row">
            <!-- Сол жақ: Студенттің ақпараты -->
<div class="col-lg-4 mb-4">
    <div class="profile-header shadow-sm" style="background-color: white; border-radius: 15px; overflow: hidden;">
        <div class="profile-cover" style="height: 100px; background: linear-gradient(135deg, #ffc107 0%, #ff8c00 100%);"></div>
        <div class="avatar-wrapper text-center" style="margin-top: -50px;">
            <div class="position-relative d-inline-block">
                <!-- Аватар -->
                <img th:src="${session.userPhoto != null ? '/uploads/' + session.userPhoto : 'https://ui-avatars.com/api/?name=' + (userName ?: 'Student') + '&background=ffc107&color=1a1a1a&size=128'}" 
                     class="avatar-img shadow" 
                     style="width: 110px; height: 110px; border-radius: 50%; border: 5px solid white; object-fit: cover; background: #eee;">
                
                <!-- Фото жүктеу батырмасы -->
                <label for="fileInput" class="position-absolute bottom-0 end-0 bg-warning rounded-circle p-2" style="cursor: pointer; border: 2px solid white; line-height: 1; display: flex;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="black" viewBox="0 0 16 16">
                        <path d="M10.5 8.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
                        <path d="M2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4H2zm.5 2a.5.5 0 1 1 0-1 .5.5 0 0 1 0 1zm9 2.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0z"/>
                    </svg>
                </label>
                <form id="photoForm" th:action="@{/profile/upload-photo}" method="post" enctype="multipart/form-data" style="display: none;">
                    <input type="file" id="fileInput" name="photo" accept="image/*" onchange="document.getElementById('photoForm').submit()">
                </form>
            </div>
            
            <!-- Мәтіндер енді қара түсті (text-dark) -->
            <h4 class="mt-3 fw-bold text-dark" th:text="${userName ?: 'Шайзада Бақтияр'}">Аты</h4>
            <p class="text-muted small mb-2">Astana International University</p>
            <div class="badge bg-warning text-dark px-3 py-1 rounded-pill mb-3 fw-bold">
                ID: <span th:text="${session.userId ?: '1'}"></span>
            </div>
        </div>

        <div class="p-4 border-top border-light">
            <div class="d-flex justify-content-between mb-2">
                <span class="text-muted small">Мамандық:</span>
                <span class="text-dark small fw-bold">Information Systems</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
                <span class="text-muted small">Курс:</span>
                <span class="text-dark small fw-bold">2-курс</span>
            </div>
            
            <!-- РЕДАКЦИЯЛАУ БАТЫРМАСЫ -->
            <!-- Бұл сілтеме сенің контроллеріңдегі @GetMapping("/settings")-ке жібереді -->
            <a th:href="@{/settings}" class="btn btn-outline-warning w-100 mt-3 btn-sm fw-bold">
                Редакциялау
            </a>
        </div>
    </div>
</div>
            <!-- Оң жақ: Активтілік -->
            <div class="col-lg-8">
                <div class="row mb-4 text-center">
    <!-- Мақалалар -->
    <div class="col-md-4">
        <div class="stat-card shadow-sm p-3 bg-white" style="border-radius: 15px;">
            <h3 class="text-warning fw-bold" th:text="${articlesCount ?: 0}">0</h3>
            <p class="text-muted small">Жаңа мақала</p>
        </div>
    </div>
    <!-- Сауалнамалар -->
    <div class="col-md-4">
        <div class="stat-card shadow-sm p-3 bg-white" style="border-radius: 15px;">
            <h3 class="text-warning fw-bold" th:text="${pollsCount ?: 5}">5</h3>
            <p class="text-muted small">Сауалнама</p>
        </div>
    </div>
    <!-- Чаттар -->
    <div class="col-md-4">
        <div class="stat-card shadow-sm p-3 bg-white" style="border-radius: 15px;">
            <h3 class="text-warning fw-bold" th:text="${chatsCount ?: 0}">0</h3>
            <p class="text-muted small">Активті чат</p>
        </div>
    </div>
</div>

                <div class="card card-custom shadow-sm p-4 mb-4 border-0">
                    <h5 class="section-title">Маған арналған мақалалар</h5>
                    <div class="list-group list-group-flush">
                        <div th:each="article : ${articles}" class="list-group-item bg-transparent border-secondary-subtle py-3 px-0">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-1 fw-bold adaptive-text" th:text="${article.title}">Тақырыбы</h6>
                                    <small class="text-secondary">
                                        Күні: <span th:text="${#temporals.format(article.createdAt, 'dd.MM.yyyy')}"></span>
                                    </small>
                                </div>
                                <a href="/home" class="btn arrow-btn btn-sm rounded-circle">→</a>
                            </div>
                        </div>
                        <div th:if="${#lists.isEmpty(articles)}" class="text-secondary small text-center py-4">
                            Әзірге жаңа мақалалар жоқ.
                        </div>
                    </div>
                </div>

                <!-- Сауалнама: Мұнда фонды стильді қалдырдым, себебі ол акцентті блок -->
                <div class="card border-0 shadow-sm p-4 rounded-4" style="background: linear-gradient(45deg, #1a1a1a, #2c2c2c);">
                    <h5 class="fw-bold mb-2 text-warning">Белсенді сауалнамалар</h5>
                    <p class="small text-secondary">Университет өмірін жақсартуға өз даусыңды бер.</p>
                    <div class="d-flex gap-2 mt-2">
                        <button class="btn btn-warning btn-sm fw-bold px-4">ҚАТЫСУ</button>
                        <button class="btn btn-outline-light btn-sm">КЕЙІН</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
