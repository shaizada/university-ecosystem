<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тіркелу | University Ecosystem</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }

        .register-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .register-header {
            background: #1a1a1a;
            color: #ffc107;
            padding: 30px;
            text-align: center;
        }

        .register-header h3 {
            font-weight: 800;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }

        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #dee2e6;
            background-color: #f8f9fa;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.2);
            border-color: #ffc107;
        }

        .btn-register {
            background-color: #1a1a1a;
            color: #ffc107;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-register:hover {
            background-color: #000;
            color: #fff;
            transform: translateY(-2px);
        }

        .login-link {
            color: #6c757d;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .login-link:hover {
            color: #1a1a1a;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="register-card">
                    <!-- Хедер -->
                    <div class="register-header">
                        <h3>UniEcosystem</h3>
                        <p class="small mb-0 text-white-50">Жаңа аккаунт құру</p>
                    </div>

                    <!-- Форма -->
                    <div class="card-body p-4 p-md-5">
                        <!-- Thymeleaf атрибуттары қосылды -->
                        <form th:action="@{/register}" th:object="${user}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold small text-uppercase">Толық аты-жөніңіз</label>
                                <input type="text" th:field="*{fullName}" class="form-control" placeholder="Мис: Арман Алиев" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold small text-uppercase">Email мекенжайы</label>
                                <input type="email" th:field="*{email}" class="form-control" placeholder="example@mail.kz" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold small text-uppercase">Құпия сөз</label>
                                <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold small text-uppercase">Жүйедегі рөліңіз</label>
                                <select th:field="*{role}" class="form-select">
                                    <option value="STUDENT">Студент</option>
                                    <option value="TEACHER">Оқытушы</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-register w-100 shadow-sm">Тіркелу</button>
                        </form>

                        <div class="mt-4 text-center">
                            <a th:href="@{/login}" class="login-link">Аккаунтыңыз бар ма? <b>Кіру</b></a>
                        </div>
                    </div>
                </div>
                
                <!-- Астындағы кішігірім мәтін -->
                <p class="text-center text-white-50 mt-4 small">
                    &copy; 2026 Astana International University. <br> Барлық құқықтар қорғалған.
                </p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
